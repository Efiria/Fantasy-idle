<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fantasy World Idle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="container my-4">
        <h1 class="text-center mb-4">Fantasy World Idle</h1>
        <div class="row game-display">
            <div class="col-3" id="production-row">
                <h4>Ressources: <span id="resources">0</span></h4>
                <div class="col" id="production-overall"></div>
                <div class="col" id="production-details"></div>
            </div>
            <div class="col-5" id="buildings-section"></div>
            <div class="col-3" id="upgrades-section"></div>
            <div class="col-1" id="settings-section">
                <div class="row justify-content-center align-items-center g-2">
                    <h4>Settings</h4>
                    <div class="col">
                        <button type="button" class="btn btn-primary" onclick="saveData()">Save data</button>
                    </div>
                    <div class="col">
                        <button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#saveModal">Delete data</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="saveModal" tabindex="-1" aria-labelledby="saveModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="saveModalLabel">Delete Save</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to remove your data save?</p>
                    <p>You will not be able to recover it</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal" onclick="clearData()">Delete data</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="saveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto">Save</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">
            Progress saved!
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="game.js"></script>
    <script src="data.js"></script>
    <script src="utils.js"></script>
</body>
</html>
